# —————————
rule-anchor:
  Local: &Local
    {type: file, behavior: classical, format: text}
  Classical: &Classical
    {type: http, behavior: classical, format: text, interval: *Time}
  IPCIDR: &IPCIDR
    {type: http, behavior: ipcidr, format: mrs, interval: *Time}
  Domain: &Domain
    {type: http, behavior: domain, format: mrs, interval: *Time}
