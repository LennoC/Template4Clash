# —————————
# 基础设置
mixed-port: 7890
redir-port: 7891
tproxy-port: 1536
ipv6: true
mode: Rule
allow-lan: true
disable-keep-alive: true
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
updatetime: &Time 86400
geox-url:
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
experimental:
  http-headers:
    request:
      - name: "User-Agent"
        value: "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Mobile Safari/537.36"
      - name: "Accept-Language"
        value: "en-US,en;q=0.9"
unified-delay: true
tcp-concurrent: true
log-level: silent # debug / silent
find-process-mode: always
#global-client-fingerprint: chrome 未来官方可能将移除，意义不大
external-controller: 0.0.0.0:9090 #修改端口后，如使用磁贴请重新正确设置API端口
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
external-ui: "./webroot/Zash/"
secret: "" # 面板访问密码，如在公网访问建议设置
# —————————
# ==== Tips
# 1. 修改配置文件保存时，建议重启服务/重载配置.
# 2. 如使用 SurfingTile 的配置覆写，当前配置文件的某些字段应保持原有的完整性结构
# —————————
# 健康检查
p: &p
  type: http
  interval: *Time
  health-check:
    enable: true
    url: https://www.gstatic.com/generate_204
    interval: 300
  proxy: 订阅更新
  header: # 如遇订阅加载不出来请切换ua
      User-Agent:  # 使用注释法由上到下 默认使用第一个
        - "ClashMetaForAndroid/2.11.2.Meta"
        - "clash-verge/v2.2.3"
        - "ClashforWindows/0.19.23"
        - "clash.meta"
        - "mihomo"
# —————————
# 订阅地址相关
A: &A
  filter: "^(?!.*(套餐|重置|剩余|到期|订阅|群|账户|流量|有效期|时间|官网|失联|余额)).*$"
  use:
  - 1.主要地址
  - 2.备用地址
  - 3.额外地址
All: &All
  type: url-test
  use:
  - 1.主要地址
  - 2.备用地址
  - 3.额外地址
proxy-providers: # ← 此函数位置请勿变动！此为模块更新时备份恢复订阅变量范围 ↓
  1.主要地址: # 如遇订阅加载不出来，请尝试切换ua
    <<: *p
    override:
      additional-prefix: "Main："
    path: ./proxies/1.主要地址.yaml
    url: "此处引入您的Clash订阅链接地址"
  2.备用地址:
    <<: *p
    override:
      additional-prefix: "Minor："
    path: ./proxies/2.备用地址.yaml
    url: "此处引入您的Clash订阅链接地址"
  3.额外地址:
    <<: *p
    override:
      additional-prefix: "Additi："
    path: ./proxies/3.额外地址.yaml
    url: "此处引入您的Clash订阅链接地址"
# —————————
# 节点记忆
profile: # ← 此函数位置请勿变动！此为模块更新时备份恢复订阅变量范围 ↑
  store-selected: true
  store-fake-ip: true
# —————————
# 嗅探模块
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 5228, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain: # 如遇需内部通信的应用请放行该域名
    - "Mijia Cloud"
# —————————
# 网卡模块
# 如需使用 建议先阅读文档：https://wiki.metacubex.one/config/inbound/tun/
tun:
  enable: false
  device: Meta
  stack: gvisor
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: false
  auto-detect-interface: true
  # 如使用黑白名单这里需排除
  # exclude-package 排除 / include-package 包含
  exclude-package:
#    - com.samsung.android.messaging # 三星专供 ↓ 范围
#    - com.samsung.android.app.telephonyui
#    - com.samsung.android.dialer
#    - com.samsung.android.incallui
#    - com.samsung.android.smartcallprovider
#    - com.samsung.android.intellivoiceservice
#    - com.android.settings
#    - com.qti.qcc
#    - com.sec.epdg
#    - com.sec.imsservice # 三星专供 ↑ 范围
    # 非三星用户不必理会，三星用户需自行取消注释 不可使用include-package
# —————————
# DNS模块
# 请勿随意变动！
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip # redir-host
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fdfe:dcba:9876::/48
  fake-ip-filter:
    - "RULE-SET:CN_域"
    - "RULE-SET:Private_域"
    - "RULE-SET:GoogleFCM_域"
    - "RULE-SET:自定义规则"
  proxy-server-nameserver:
    - https://1.12.12.12:443/dns-query#🌐 本机·本地直连&h3=false
    - https://120.53.53.53:443/dns-query#🌐 本机·本地直连&h3=false
    - https://223.5.5.5:443/dns-query#🌐 本机·本地直连&h3=true
    - https://223.6.6.6:443/dns-query#🌐 本机·本地直连&h3=true
  nameserver-policy:
    "RULE-SET:CN_域,Microsoft_域,Apple_域":
      - https://1.12.12.12:443/dns-query#🌐 本机·本地直连&h3=false
      - https://120.53.53.53:443/dns-query#🌐 本机·本地直连&h3=false
      - https://223.5.5.5:443/dns-query#🌐 本机·本地直连&h3=true
      - https://223.6.6.6:443/dns-query#🌐 本机·本地直连&h3=true
  nameserver:
    # Google
    - https://8.8.8.8:443/dns-query#DNS连接&h3=true
    - https://8.8.4.4:443/dns-query#DNS连接&h3=true
    # Cloudflare
    - https://1.1.1.1:443/dns-query#DNS连接&h3=true
    - https://1.0.0.1:443/dns-query#DNS连接&h3=true
  direct-nameserver:
    # 腾讯/阿里兜底
    # 正确配置本地后可移除 否则会卡[可选]
    - 1.12.12.12
    - 223.6.6.6
    # ----------------
    # 你的本地
    # 各大路由器/光猫默认 DNS
    - 192.168.1.1    # 请确保当前局域网可通
    # SIM卡运营商 [下方替换成你的运营商 一般有鉴权]
    - 120.80.80.80  # ← 替换成你想用的 或者删除
    - 221.5.88.88   # ← 替换成你想用的 或者删除
# —————————
proxies:
  - {name: 🌐 本机·本地直连, type: direct, udp: true}
  - {name: ⛔️ 禁止·拒绝连接, type: reject}
  - {name: 🌐 DNS_Hijack, type: dns}
proxy_groups: &proxy_groups
    type: select
    proxies:
      - 总模式
      - ALL·延迟最低
      - ALL·负载均衡
      - ALL·故障转移
      - ALL·中国台湾
      - ALL·香港地区
      - ALL·美国地区
      - ALL·日本地区
      - ALL·狮城地区
      - ALL·其它地区
      - ⛔️ 禁止·拒绝连接
      - 🌐 本机·本地直连
    <<: *A
