rule-providers-anchor:
    # 锚点 如合并时有重复的项,则不会去合并; 锚点名尽量不要含特殊字符
    # - &rule_asn { type: http,behavior: ipcidr,format: mrs,proxy: Update,interval: 86400 }
    - &rule { type: http, behavior: classical, format: text, proxy: Update, interval: 86400 }
    - &site_rule { type: http, behavior: domain, format: mrs, proxy: Update, interval: 86400 }
    - &ip_rule { type: http, behavior: ipcidr, format: mrs, proxy: Update, interval: 86400 }

rule-providers:
    # 对于去广告,按 IP 地理信息分流等需要大量规则的场景,建议使用 domain 或 ipcidr 类型的规则集合,这能有效降低内存占用并提高匹配速度
    # 不建议使用大量 classical 类型的规则集合。此类规则只能进行顺序匹配，会显著增加匹配耗时和内存占用
    site_private: { <<: *site_rule, path: ./rules/site/private.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/private.mrs' }
    site_ad: { <<: *site_rule, path: ./rules/site/awavenue-ads-rule.mrs, url: 'https://testingcf.jsdelivr.net/gh/TG-Twilight/AWAvenue-Ads-Rule@main/Filters/AWAvenue-Ads-Rule-Clash.mrs' }
    site_httpdns: { <<: *site_rule, path: ./rules/site/httpdns.mrs, url: 'https://testingcf.jsdelivr.net/gh/yiteei/Share@Proxy/rules/site/httpdns.mrs' }
    site_webrtc: { <<: *site_rule, path: ./rules/site/webrtc.mrs, url: 'https://testingcf.jsdelivr.net/gh/yiteei/Share@Proxy/rules/site/webrtc.mrs' }
    site_googlefcm: { <<: *site_rule, path: ./rules/site/googlefcm.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/googlefcm.mrs' }
    site_telegram: { <<: *site_rule, path: ./rules/site/telegram.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/telegram.mrs' }
    site_youtube: { <<: *site_rule, path: ./rules/site/youtube.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/youtube.mrs' }
    site_category-ai-!cn: { <<: *site_rule, path: ./rules/site/category-ai-!cn.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-ai-!cn.mrs' }
    site_win-update: { <<: *site_rule, path: ./rules/site/win-update.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/win-update.mrs' }
    site_onedrive: { <<: *site_rule, path: ./rules/site/onedrive.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/onedrive.mrs' }
    site_category-games-!cn: { <<: *site_rule, path: ./rules/site/category-games-!cn.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-games-!cn.mrs' }
    site_cn: { <<: *site_rule, path: ./rules/site/cn.mrs, url: 'https://testingcf.jsdelivr.net/gh/yiteei/Share@Proxy/rules/site/cn.mrs' }

    ip_private: { <<: *ip_rule, path: ./rules/ip/private.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs' }
    ip_httpdns: { <<: *ip_rule, path: ./rules/ip/httpdns.mrs, url: 'https://testingcf.jsdelivr.net/gh/yiteei/Share@Proxy/rules/ip/httpdns.mrs' }
    ip_webrtc: { <<: *ip_rule, path: ./rules/ip/webrtc.mrs, url: 'https://testingcf.jsdelivr.net/gh/yiteei/Share@Proxy/rules/ip/webrtc.mrs' }
    ip_telegram: { <<: *ip_rule, path: ./rules/ip/telegram.mrs, url: 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/telegram.mrs' }
    ip_cn: { <<: *ip_rule, path: ./rules/ip/cn.mrs, url: 'https://testingcf.jsdelivr.net/gh/yiteei/Share@Proxy/rules/ip/cn.mrs' }

    flexireject:
        type: inline
        <<: *rule
        payload:
            - DOMAIN,ic.adobe.io # Adobe 正版弹窗
            - DOMAIN-REGEX,^[a-z\d]{10}\.adobe\.io$
            - DOMAIN-SUFFIX,adobestats.io
            - DOMAIN,cc-api-data.adobe.io
            - DOMAIN,wetype.weixin.qq.com # 微信输入法
            - IP-CIDR,95.161.76.100/31,no-resolve # 防止 Telegram 转圈
    flexirule:
        type: inline
        <<: *rule
        payload:
            - DOMAIN-SUFFIX,easebar.com # 网易
            - DOMAIN-SUFFIX,deepseek.com # DeepSeek
            - 'short.weixin.qq.com'
            - '+short.weixin.qq.com'
            - 'long.weixin.qq.com'
            - '+long.weixin.qq.com'

rules:
    # 分流规则可以直接引用代理或策略组,但不能引用远程代理集; 对于每一条连接,总是从上到下匹配规则; 需要复杂条件时,可以用逻辑运算符去组合多个规则. 并且逻辑规则是可以相互嵌套的
    - AND,((DST-PORT,53),(NOT,((IN-TYPE,Inner)))),dns-hijack # 劫持 DNS 到 Clash 内部 DNS 模块
    - RULE-SET,site_private,Local
    - RULE-SET,site_httpdns,Httpdns
    - AND,((DST-PORT,3478),(RULE-SET,site_webrtc)),WebRTC
    - RULE-SET,site_ad,Advert
    - RULE-SET,flexireject,REJECT-DROP # 自定义拦截
    - RULE-SET,flexirule,FlexiRule # 自定义代理
    - AND,((DST-PORT,5228-5230),(RULE-SET,site_googlefcm)),Message
    - RULE-SET,site_telegram,Telegram
    - RULE-SET,site_youtube,YouTube
    - RULE-SET,site_category-ai-!cn,LModel
    - RULE-SET,site_onedrive,OneDrive
    - RULE-SET,site_win-update,Update # Windows 更新
    - RULE-SET,site_category-games-!cn,GamePl
    - IN-NAME,in_mixed,InMixed # 混合入站,用来控制下载等..
    - RULE-SET,site_cn,Local

    - RULE-SET,ip_private,Local,no-resolve
    - RULE-SET,ip_httpdns,Httpdns
    - RULE-SET,ip_webrtc,WebRTC
    - AND,((DST-PORT,3478),(RULE-SET,ip_webrtc)),WebRTC
    - RULE-SET,ip_telegram,Telegram
    - RULE-SET,ip_cn,Local
    - MATCH,Proxy # 无条件匹配所有请求
